<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudentHub | Register</title>

<link rel="stylesheet" href="css/style.css">

</head>
<style>
  


.register-container{

    max-width:700px;
    margin:40px auto;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);

}


.register-container h2{

    text-align:center;
    color:#1565c0;
    margin-bottom:25px;

}



.register-container label{

    display:block;
    font-weight:bold;
    margin-top:15px;
    color:#333;

}



.register-container input,
.register-container select,
.register-container textarea{


    width:100%;
    padding:13px;
    margin-top:8px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;


}



.register-container input:focus,
.register-container select:focus,
.register-container textarea:focus{


    outline:none;
    border:2px solid #1565c0;
    box-shadow:0 0 5px #90caf9;


}



.register-container textarea{

    resize:none;

}



.register-container button{


    width:100%;
    margin-top:25px;
    padding:14px;

    background:#1565c0;
    color:white;

    border:none;
    border-radius:8px;

    font-size:18px;
    cursor:pointer;

    transition:.3s;


}



.register-container button:hover{


    background:#0d47a1;


}


/* Mobile Responsive */

@media(max-width:768px){


.register-container{

    width:95%;
    padding:20px;

}


}
</style>

<body>


<header>

<h1>StudentHub Portal</h1>



</header>



<div class="breadcrumb">

<a href="index.html">Home</a> > Register

</div>



<main>


<section class="register-container">


<h2>Student Registration</h2>


<form>


<label for="name">
Full Name
</label>

<input 
type="text"
id="name"
name="name"
placeholder="Enter your name"
required>



<label for="email">
Email Address
</label>

<input
type="email"
id="email"
name="email"
placeholder="Enter your email"
required>



<label for="phone">
Mobile Number
</label>

<input
type="tel"
id="phone"
name="phone"
placeholder="Enter mobile number"
required>



<label for="course">
Select Course
</label>


<select id="course">

<option>BCA</option>
<option>B.TECh</option>
<option>BBA</option>
<option>B.Com</option>
<option>B.Sc</option>
<option>MCA</option>


</select>




<label for="password">
Password
</label>


<input
type="password"
id="password"
name="password"
placeholder="Create password"
required>



<label for="address">
Address
</label>


<textarea 
id="address"
rows="4"
placeholder="Enter address">
</textarea>



<button type="submit">
Register
</button>



</form>


</section>


</main>




<footer>

<p>
© 2026 StudentHub Portal   |   made by Ansh Patel😊
</p>

</footer>


</body>

</html>
